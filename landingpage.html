<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サバ活 — サバゲー戦績・記録アプリ</title>
<meta name="description" content="サバ活は、サバイバルゲームの戦績・出撃記録をかんたんに残せるアプリです。">
<style>
  :root{--ink:#d6f549;--ink2:#f246a8;--bg:#1b1d22;--text:#e8ecf2;--muted:#9aa2ae;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'Hiragino Sans','Helvetica Neue',sans-serif;
       min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{max-width:420px;width:100%;text-align:center;}
  .logo{display:inline-block;background:#fff;color:#1b1d22;font-size:34px;font-weight:900;letter-spacing:6px;
        padding:10px 28px;border-radius:8px;transform:rotate(-2deg);box-shadow:4px 4px 0 #00000066;}
  .sub{color:var(--ink);font-size:14px;font-weight:800;letter-spacing:2px;margin-top:14px;}
  .desc{color:var(--muted);font-size:14px;line-height:1.9;margin:18px 0 28px;}
  .btn{display:block;border-radius:14px;padding:16px;font-size:16px;font-weight:800;text-decoration:none;margin-bottom:12px;}
  .btn.ios{background:var(--ink);color:#16181c;}
  .btn.android{border:2px solid #3a4252;color:var(--muted);}
  .soon{font-size:11px;font-weight:700;opacity:.75;display:block;margin-top:2px;}
  .foot{color:#5a6470;font-size:11px;margin-top:26px;line-height:1.8;}
  .foot a{color:#8a93a0;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">サバ活</div>
  <div class="sub">サバゲー戦績・記録アプリ</div>
  <p class="desc">
    出撃した日・ゲーム結果・キル/デス・フィールドの記録を蓄積<br>
    </p>

  <!-- 公開後: href を App Store の URL（https://apps.apple.com/jp/app/id6777925478）に差し替え -->
  <a class="btn ios" href="https://apps.apple.com/jp/app/id6777925478">
    App Store で入手
    <span class="soon">（近日公開）</span>
  </a>
  <!-- Android 版公開後: href を Google Play の URL に差し替えて soon を外す -->
  <a class="btn android" href="#" onclick="return false;">
    Google Play
    <span class="soon">準備中</span>
  </a>

  <p class="foot">
    <a href="./support.html">サポート</a> ・ <a href="./privacy-policy.html">プライバシーポリシー</a><br>
    © 63works
  </p>
</div>
</body>
</html>
